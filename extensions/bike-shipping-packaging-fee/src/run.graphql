query RunInput($bikeShippingCollectionIds: [ID!]) {
  presentmentCurrencyRate
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            inBikeShippingCollection: inAnyCollection(
              ids: $bikeShippingCollectionIds
            )
          }
        }
      }
    }
  }
  cartTransform {
    configuration: metafield(
      namespace: "$app:bike-shipping"
      key: "function-configuration"
    ) {
      value
    }
  }
}
